# Server port
server.port=8081

# MongoDB connection
spring.data.mongodb.uri=mongodb://localhost:27017/bloodbank
spring.data.mongodb.database=bloodbank
spring.data.mongodb.auto-index-creation=true

# Disable JPA (using MongoDB)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# CORS configuration
spring.web.cors.allowed-origins=http://localhost:4200,http://localhost:52756,http://localhost:53385,http://localhost:56053
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.example.bloodbank=DEBUG