<div class="text-center mt-5">
  <h1 class="display-4 text-danger">🩸 AI-Based Blood Donation</h1>
  <p class="lead">Donate Blood, Save Lives ❤️</p>
  
  <div class="row mt-5">
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h3>📝 Register</h3>
          <p>Become a blood donor</p>
          <button class="btn btn-danger" routerLink="/register">Register Now</button>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h3>🆘 Request</h3>
          <p>Need blood urgently?</p>
          <button class="btn btn-primary" routerLink="/request">Request Blood</button>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h3>👥 Donors</h3>
          <p>View all donors</p>
          <button class="btn btn-success" routerLink="/donors">View List</button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="mt-4">
    <button class="btn btn-info" routerLink="/admin">Admin Dashboard</button>
  </div>
</div>
