<div class="container mt-4">
  <h2>🩸 Donor Registration</h2>
  
  <form #donorForm="ngForm" (ngSubmit)="registerDonor()">
    
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input class="form-control" 
             type="text" 
             placeholder="Full Name" 
             [(ngModel)]="donor.name" 
             name="name"
             required>
      <div class="text-danger" *ngIf="donorForm.submitted && !donor.name">
        Name is required
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Age</label>
      <input class="form-control" 
             type="number" 
             placeholder="Age" 
             [(ngModel)]="donor.age" 
             name="age"
             required 
             min="18" 
             max="65">
      <div class="text-danger" *ngIf="donorForm.submitted && !donor.age">
        Age is required (18-65)
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Blood Group</label>
      <select class="form-control" 
              [(ngModel)]="donor.bloodGroup" 
              name="bloodGroup" 
              required>
        <option value="">Select Blood Group</option>
        <option>A+</option>
        <option>A-</option>
        <option>B+</option>
        <option>B-</option>
        <option>O+</option>
        <option>O-</option>
        <option>AB+</option>
        <option>AB-</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Phone</label>
      <input class="form-control" 
             type="tel" 
             placeholder="Phone Number" 
             [(ngModel)]="donor.phone" 
             name="phone"
             required 
             pattern="[0-9]{10}">
    </div>

    <div class="mb-3">
      <label class="form-label">Email (Optional)</label>
      <input class="form-control" 
             type="email" 
             placeholder="Email" 
             [(ngModel)]="donor.email" 
             name="email">
    </div>

    <!-- Location with Autocomplete -->
    <div class="mb-3 position-relative">
      <label class="form-label">Location/City <span class="text-danger">*</span></label>
      <input class="form-control" 
             type="text" 
             placeholder="Type your city or village" 
             [(ngModel)]="donor.location" 
             name="location"
             (input)="filterCities($event)"
             (focus)="onLocationFocus()"
             (blur)="hideSuggestions()"
             required
             autocomplete="off">
      
      <div *ngIf="showSuggestions && filteredCities.length > 0" 
           class="suggestions-dropdown">
        <div *ngFor="let city of filteredCities" 
             class="suggestion-item"
             (mousedown)="selectCity(city)">
          {{city}}
        </div>
      </div>
      
      <small class="text-muted">Start typing your city or village name</small>
    </div>

    <div class="mb-3">
      <label class="form-label">Last Donation Date (Optional)</label>
      <input class="form-control" 
             type="date" 
             [(ngModel)]="donor.lastDonationDate" 
             name="lastDonationDate">
    </div>

    <button type="submit" 
            class="btn btn-success" 
            [disabled]="!donorForm.form.valid">
      Register Donor
    </button>
    
    <button type="button" 
            class="btn btn-secondary ms-2" 
            routerLink="/">
      Back
    </button>

    <!-- ✅ FIXED: Changed error to isError -->
    <div *ngIf="message" class="alert mt-3" 
         [class.alert-success]="!isError" 
         [class.alert-danger]="isError">
      {{message}}
    </div>
  </form>
</div>
